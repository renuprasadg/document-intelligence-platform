# OpenAI Model Pricing Configuration
# source: https://platform.openai.com/pricing
# unit: USD per 1M tokens

models:
  # GPT-4 Family
  gpt-4:
    input: 30.00
    output: 60.00
    
  gpt-4-turbo:
    input: 10.00
    output: 30.00
    
  gpt-4-turbo-preview:
    input: 10.00
    output: 30.00
  
  # GPT-3.5 Family
  gpt-3.5-turbo:
    input: 0.50
    output: 1.50
    
  gpt-3.5-turbo-16k:
    input: 3.00
    output: 4.00
  
  # Embedding Models
  text-embedding-3-small:
    input: 0.02
    output: 0.00
    
  text-embedding-3-large:
    input: 0.13
    output: 0.00
    
  text-embedding-ada-002:
    input: 0.10
    output: 0.00

# Default model if not specified
default_model: gpt-4

# Fallback pricing if model not found
fallback_pricing:
  input: 30.00
  output: 60.00
